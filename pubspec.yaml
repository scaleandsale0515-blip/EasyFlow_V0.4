name: easyflow
description: "EasyFlow - Factory Production, Transport & Worker Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local storage
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  path_provider: ^2.1.4

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.69.0

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Security
  crypto: ^3.0.5

  # Backup / file handling
  archive: ^3.6.1
  file_picker: ^8.1.2
  share_plus: ^10.1.4
  permission_handler: ^11.3.1

  # Utility
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.5.3
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icon/
